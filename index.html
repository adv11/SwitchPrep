<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SwitchPrep is a switch preparation tracker for Java Spring Boot backend engineers with GenAI and Agentic AI skills.">
  <title>SwitchPrep</title>
  <script>
    (function () {
      var stored = localStorage.getItem('switchprep-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles/app.css">
</head>
<body>
  <div id="app" class="app-shell"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
