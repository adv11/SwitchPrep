name: Realtime Database backup

# Daily snapshot of the entire Firebase Realtime Database, kept as a GitHub
# Actions artifact. See docs/architecture.md's "Database backup & disaster
# recovery" section for the retention policy and restore procedure (issue #130).

on:
  schedule:
    # 09:00 UTC daily — off-peak for this app's userbase, ahead of most weekday activity.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    name: Export Realtime Database
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check backup readiness
        id: ready
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SERVICE_ACCOUNT" ] && [ -n "${{ vars.FIREBASE_PROJECT_ID }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  FIREBASE_SERVICE_ACCOUNT secret or FIREBASE_PROJECT_ID variable not set — backup skipped"
          fi

      - name: Write service account key
        if: steps.ready.outputs.ok == 'true'
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$SERVICE_ACCOUNT" > "$RUNNER_TEMP/service-account.json"

      - name: Install Firebase CLI
        if: steps.ready.outputs.ok == 'true'
        run: npm install -g firebase-tools

      - name: Export database snapshot
        if: steps.ready.outputs.ok == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
        run: |
          SNAPSHOT_NAME="rtdb-backup-$(date -u +%Y-%m-%dT%H-%M-%SZ).json"
          echo "SNAPSHOT_NAME=$SNAPSHOT_NAME" >> "$GITHUB_ENV"
          firebase database:get / \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --output "$SNAPSHOT_NAME"

      - name: Upload snapshot artifact
        if: steps.ready.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SNAPSHOT_NAME }}
          path: ${{ env.SNAPSHOT_NAME }}
          # Daily snapshots kept 30 days; see docs/architecture.md for the
          # documented long-term retention policy (weekly snapshots saved
          # manually by whoever downloads them, until this graduates to a
          # Cloud Storage bucket with lifecycle rules).
          retention-days: 30

      - name: Clean up credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/service-account.json"
